name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - run: go mod download

      - run: make check

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2